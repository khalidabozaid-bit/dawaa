<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>دواء | نظام إدارة جرد الأدوية</title>
    
    <!-- Design System (Modular) -->
    <link rel="stylesheet" href="css/modules/base.css">
    <link rel="stylesheet" href="css/modules/layout.css">
    <link rel="stylesheet" href="css/modules/components.css">
    <link rel="stylesheet" href="css/modules/views.css">
    <link rel="stylesheet" href="css/modules/dark.css">
    <link rel="stylesheet" href="css/modules/auth.css">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" href="manifest.json">
</head>
<body class="safe-area-inset">

    <!-- Splash Screen -->
    <section id="view-splash" class="view splash-screen active">
        <div class="splash-content">
            <div class="splash-logo"><i class='bx bxs-capsule'></i></div>
            <h1 class="app-name">دواء</h1>
            <div class="loading-bar"><div class="progress"></div></div>
        </div>
    </section>

    <!-- Auth View -->
    <section id="view-login" class="view auth-view">
        <div class="auth-card">
            <div class="auth-header">
                <i class='bx bxs-shield-quarter'></i>
                <h2>دخول آمن</h2>
                <p>سجل هويتك للوصول لنظام جرد "دواء"</p>
            </div>
            <div class="auth-body">
                <div class="input-group">
                    <label>الاسم</label>
                    <input type="text" id="auth-name" class="auth-input" placeholder="مثال: خالد">
                </div>
                <div class="input-group">
                    <label>رقم الهوية / الكود</label>
                    <input type="password" id="auth-email" class="auth-input" placeholder="******">
                </div>
                <button class="btn-auth" onclick="window.App.handleAuthSubmit()">دخول النظام 🛰️</button>
            </div>
        </div>
    </section>

    <!-- App Header -->
    <header class="app-header">
        <div class="header-content container">
            <div class="user-profile" onclick="window.App.openProfile()">
                <div class="avatar"><i class='bx bxs-user-circle'></i></div>
                <div class="user-info">
                    <span class="greeting">أهلاً،</span>
                    <span class="user-name" id="display-user-name">...</span>
                </div>
            </div>
            <div class="app-logo">
                <i class='bx bxs-capsule'></i>
                <h1>دواء <span class="ver-badge">v16.0.7 Emergency</span></h1>
            </div>
            <div class="header-actions">
                <div id="cloud-sync-indicator" class="sync-indicator offline" title="حالة السحابة">
                    <i class='bx bx-cloud-off'></i>
                </div>
                <button class="icon-btn" onclick="window.App.handleLogout()" title="خروج">
                    <i class='bx bx-log-out'></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-main container">
        
        <!-- Dashboard View -->
        <section id="view-dashboard" class="view">
            <div class="dashboard-stats-grid">
                <div class="stat-card">
                    <span class="stat-val" id="total-meds">0</span>
                    <span class="stat-label">إجمالي المواد</span>
                    <i class='bx bx-list-check icon-bg'></i>
                </div>
                <div class="stat-card warning">
                    <span class="stat-val" id="low-stock-count">0</span>
                    <span class="stat-label">أرصدة منخفضة</span>
                    <i class='bx bx-trending-down icon-bg'></i>
                </div>
                <div class="stat-card danger">
                    <span class="stat-val" id="expired-count">0</span>
                    <span class="stat-label">تنبيه صلاحية</span>
                    <i class='bx bx-time-five icon-bg'></i>
                </div>
            </div>

            <!-- Management Hub (Quick Actions) -->
            <div class="management-hub mt-20">
                <div class="hub-header" onclick="window.App.toggleHubNotifications()">
                    <div class="hub-title">
                        <i class='bx bxs-zap text-warning'></i>
                        <h3>مركز إدارة الجرد (v16)</h3>
                        <span id="hub-notif-count" class="badge">0</span>
                    </div>
                    <i class='bx bx-chevron-down' id="notif-chevron"></i>
                </div>
                <div id="hub-notif-list" class="notif-list-container"></div>
            </div>

            <!-- Global Search -->
            <div class="global-search-container mt-20">
                <div class="search-box">
                    <i class='bx bx-search'></i>
                    <input type="text" id="main-search" placeholder="ابحث عن دواء بالاسم أو الباركود..." oninput="window.handleSearch(this.value)">
                </div>
                <div id="quick-search-results" class="results-list"></div>
            </div>
        </section>

        <!-- Other Views (Smart Inventory, Reports, Settings) -->
        <section id="view-smart-inventory" class="view">
            <div class="view-header"><h2>🗂️ تصنيفات الجرد</h2></div>
            <div id="categories-grid" class="grid-v15"></div>
        </section>

        <section id="view-inventory" class="view">
            <div class="view-header"><h2>📊 التقارير والتصدير</h2></div>
            <div class="reports-grid">
                <div class="report-card" onclick="window.App.exportFull()">
                    <i class='bx bxs-file-export'></i>
                    <h3>جرد كلي (Excel)</h3>
                </div>
            </div>
        </section>

        <section id="view-settings" class="view">
            <div class="view-header"><h2>⚙️ الإعدادات</h2></div>
            <div class="settings-list">
                <div class="settings-item" onclick="window.App.forceUpdateSystem()">
                    <i class='bx bx-refresh text-danger'></i>
                    <span>تحديث إجباري (للطوارئ)</span>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-content container">
            <button class="nav-item active" data-target="dashboard">
                <i class='bx bxs-home-circle'></i>
                <span>الرئيسية</span>
            </button>
            <button class="nav-item" data-target="smart-inventory">
                <i class='bx bxs-category'></i>
                <span>الجرد</span>
            </button>
            <div class="nav-action-btn">
                <button id="btn-quick-add" onclick="window.App.openQuickAdd()">
                    <i class='bx bx-plus'></i>
                </button>
            </div>
            <button class="nav-item" data-target="inventory">
                <i class='bx bxs-file-doc'></i>
                <span>التقارير</span>
            </button>
            <button class="nav-item" data-target="settings">
                <i class='bx bxs-cog'></i>
                <span>إعدادات</span>
            </button>
        </div>
    </nav>

    <div id="modal-container" class="modal-overlay"></div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script type="module" src="js/app.js?v=16.0.7"></script>
</body>
</html>
